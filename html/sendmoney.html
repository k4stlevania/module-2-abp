<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Send Money</title>
</head>

<body>
    <div class="container mt-5" style="max-width: 600px;">
        <div id="dangerAlert" class="alert alert-danger d-none" role="alert">
        </div>
        <h2>Enviar Dinero</h2>
        <div>
            <div>
                <p>Buscar en la agenda de transferencias:</p>


                <input type="text" id="searchContact" class="form-control" placeholder="buscar contacto">


                <!-- Button trigger modal -->
                <button type="button" class="btn btn-primary mt-3" data-bs-toggle="modal"
                    data-bs-target="#staticBackdrop">
                    Agregar nuevo contacto
                </button>

                <!-- Modal -->
                <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false"
                    tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h1 class="modal-title fs-5" id="staticBackdropLabel">Datos de contacto</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <form id="newContactForm" class="modal-body">
                                <div class="p-2">
                                    <label for="contactName" class="form-label">Nombre y Apellido:</label>
                                    <input type="text" name="contactName" id="contactName" class="form-control">
                                </div>
                                <div class="p-2">
                                    <label for="contactCBU" class="form-label">Numero CBU:</label>
                                    <input type="number" name="contactCBU" id="contactCBU" class="form-control">
                                </div>
                                <div class="p-2">
                                    <label for="contactAlias" class="form-label ">Alias:</label>
                                    <input type="text" name="contactAlias" id="contactAlias" class="form-control">
                                </div>
                                <div class="p-2">
                                    <label for="bankName" class="form-label">Nombre del Banco:</label>
                                    <input type="text" name="bankName" id="bankName" class="form-control">
                                </div>
                                <div class="modal-footer">
                                    <button type="submit" class="btn btn-primary addUserBtn"
                                        data-bs-dismiss="modal">Agregar Contacto</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="mt-3">
                    <h3>Contactos</h3>
                    <ul class="list-group contactList">

                    </ul>
                    <div class="mt-3">
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sendMoney">Enviar dinero</button>

                        <div class="modal fade" id="sendMoney" data-bs-backdrop="static" data-bs-keyboard="false"
                            tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h1 class="modal-title fs-5" id="staticBackdropLabel">Transferencia</h1>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form action="" id="moneyToSend">
                                            <div>
                                                <label for="amount" class="form-label">Cantidad a enviar:</label>
                                                <input type="number" id="amount" name="amount" class="form-control" placeholder="$000000000">
                                            </div>
                                            <div class="modal-footer">
                                                <button type="submit" class="btn btn-primary sendMoneyBtn">Enviar Dinero</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="menu.html" class="btn btn-dark">Volver al menu principal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/sendMoneyFunctionality.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
